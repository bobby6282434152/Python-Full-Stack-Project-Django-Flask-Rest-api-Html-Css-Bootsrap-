{% extends 'base.html' %}

{% block content %}

<h1>Add Student</h1>

<form action="{{ url_for('add_student') }}" method="post">
    <div class="form-class">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required placeholder="Enter student name"><br>
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" required placeholder="Enter student age"><br>
    <label for="course">Course:</label>
    <input type="text" id="course" name="course" required placeholder="Enter student course"><br>
    <button class="add-student" type="submit">Add Student</button>
    </div>
</form>
{% endblock %}
