{% extends 'base.html' %}

{% block content %}
<h1>Update Student</h1>
<form action="" method="post">
    <label for="name">Name:</label>
    <input type="text"  name="name" required value="{{ student.name }}"><br>
    <label for="age">Age:</label>
    <input type="number"  name="age" required value="{{ student.age }}"><br>
    <label for="course">Course:</label>
    <input type="text"  name="course" required value="{{ student.course }}"><br>
    <button class="update-student" type="submit">Update Student</button>
</form>
{% endblock %}
