{% extends 'base.html' %}

{% block content %}
<h2>Doctors List</h2>

<div class="row">
{% for doctor in doctors %}
    <div class="col-md-4">
        <div class="card mb-3">
            <img src="{{ doctor.image.url }}" class="card-img-top" height="200">
            <div class="card-body">
                <h5>{{ doctor.user.username }}</h5>
                <p>{{ doctor.specialization }}</p>
            </div>
        </div>
    </div>
{% endfor %}
</div>
{% endblock %}
