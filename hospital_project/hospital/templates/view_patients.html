{% extends 'base.html' %}

{% block content %}
<h2>Patients List</h2>

<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Disease</th>
    </tr>

    {% for patient in patients %}
    <tr>
        <td>{{ patient.user.username }}</td>
        <td>{{ patient.age }}</td>
        <td>{{ patient.disease }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
